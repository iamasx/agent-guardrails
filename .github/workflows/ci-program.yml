name: CI — Program

on:
  push:
    branches: [main]
    paths:
      - "program/**"
      - "sdk/idl/**"
  pull_request:
    paths:
      - "program/**"
      - "sdk/idl/**"

concurrency:
  group: ci-program-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: v1.18.18
  ANCHOR_VERSION: 0.30.1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        working-directory: program/programs/guardrails
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            program/target
          key: clippy-${{ hashFiles('program/programs/guardrails/Cargo.toml', 'program/Cargo.toml') }}
          restore-keys: clippy-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Run Clippy
        working-directory: program/programs/guardrails
        run: cargo clippy -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Cache Solana CLI
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: solana-${{ env.SOLANA_VERSION }}-${{ runner.os }}

      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            program/target
          key: cargo-${{ hashFiles('program/programs/guardrails/Cargo.toml', 'program/Cargo.toml', 'program/Cargo.lock') }}
          restore-keys: cargo-

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: program
        run: pnpm install

      # RUSTC_BOOTSTRAP=1 enables proc_macro2::Span::source_file() which
      # anchor-syn 0.30.1 requires during IDL generation.
      # proc-macro2 is pinned to <=1.0.94 in Cargo.lock for this to work.
      - name: Build
        working-directory: program
        env:
          RUSTC_BOOTSTRAP: "1"
        run: anchor build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: program-build
          path: |
            program/target/idl/
            program/target/deploy/
          retention-days: 1

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Cache Solana CLI
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: solana-${{ env.SOLANA_VERSION }}-${{ runner.os }}

      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            program/target
          key: cargo-${{ hashFiles('program/programs/guardrails/Cargo.toml', 'program/Cargo.toml', 'program/Cargo.lock') }}
          restore-keys: cargo-

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: program
        run: pnpm install

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: program-build
          path: program/target/

      - name: Test
        working-directory: program
        run: anchor test --skip-local-validator --skip-deploy

  idl-check:
    name: IDL Sync Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: program-build
          path: program/target/

      - name: Verify IDL is current
        run: |
          if [ -f program/target/idl/guardrails.json ]; then
            if ! diff -q program/target/idl/guardrails.json sdk/idl/guardrails.json > /dev/null 2>&1; then
              echo "::error::sdk/idl/guardrails.json is out of date. Run: scripts/sync-sdk.sh"
              diff program/target/idl/guardrails.json sdk/idl/guardrails.json || true
              exit 1
            fi
            echo "IDL is in sync"
          fi
