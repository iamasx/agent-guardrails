name: CI — Program

on:
  push:
    branches: [main]
    paths:
      - "program/**"
      - "sdk/idl/**"
  pull_request:
    paths:
      - "program/**"
      - "sdk/idl/**"

concurrency:
  group: ci-program-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: v1.18.18
  ANCHOR_VERSION: 0.30.1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        working-directory: program/programs/guardrails
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            program/target
          key: clippy-${{ hashFiles('program/programs/guardrails/Cargo.toml', 'program/Cargo.toml') }}
          restore-keys: clippy-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Run Clippy
        working-directory: program/programs/guardrails
        run: cargo clippy -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Cache Solana CLI
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: solana-${{ env.SOLANA_VERSION }}-${{ runner.os }}

      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            program/target
          key: cargo-${{ hashFiles('program/programs/guardrails/Cargo.toml', 'program/Cargo.toml', 'program/Cargo.lock') }}
          restore-keys: cargo-

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: program
        run: pnpm install

      # Use cargo-build-sbf directly instead of `anchor build` to avoid
      # the IDL generation phase, which requires proc_macro::SourceFile
      # (stripped from Solana 1.18's platform-tools rustc). The committed
      # IDL at sdk/idl/ is the source of truth — verified by sync-sdk.sh.
      - name: Build SBF
        working-directory: program
        run: cargo build-sbf --manifest-path programs/guardrails/Cargo.toml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: program-build
          path: program/target/deploy/
          retention-days: 1

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Cache Solana CLI
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: solana-${{ env.SOLANA_VERSION }}-${{ runner.os }}

      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            program/target
          key: cargo-${{ hashFiles('program/programs/guardrails/Cargo.toml', 'program/Cargo.toml', 'program/Cargo.lock') }}
          restore-keys: cargo-

      - name: Install pnpm
        run: npm install -g pnpm

      # --force ensures platform-specific native binaries (litesvm-linux-x64-gnu)
      # are installed even if lockfile was generated on macOS
      - name: Install dependencies
        working-directory: program
        run: pnpm install --force

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: program-build
          path: program/target/deploy/

      # Copy committed IDL to target/idl/ where tests expect it
      - name: Setup IDL for tests
        run: mkdir -p program/target/idl && cp sdk/idl/guardrails.json program/target/idl/

      # LiteSVM's native addon can OOM or crash during cleanup on CI runners
      # (7 GB RAM). Add swap as overflow safety net.
      - name: Add swap space
        uses: pierotofy/set-swap-space@v1.0
        with:
          swap-size-gb: 10

      # Run each test file in its own Node process to isolate LiteSVM memory.
      # LiteSVM's native addon crashes with bad_alloc when too much state
      # accumulates in a single process on CI runners (7 GB RAM).
      - name: Test
        working-directory: program
        run: |
          for f in tests/initialize-policy.ts tests/update-policy.ts tests/pause-agent.ts tests/resume-agent.ts tests/guarded-execute.ts tests/integration.ts; do
            echo "=== Running $f ==="
            node --max-old-space-size=4096 --import tsx/esm node_modules/mocha/bin/mocha.js -t 1000000 --exit "$f"
          done
