name: CI — SDK Sync Check

on:
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "server/src/sdk/**"
      - "dashboard/lib/sdk/**"
  pull_request:
    paths:
      - "sdk/**"
      - "server/src/sdk/**"
      - "dashboard/lib/sdk/**"

concurrency:
  group: sdk-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-server:
    name: Server SDK Copy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check server SDK copy
        run: |
          if ! diff -rq sdk/ server/src/sdk/ > /dev/null 2>&1; then
            echo "::error::server/src/sdk/ is out of sync with sdk/"
            echo "Run: bash scripts/sync-sdk.sh"
            diff -r sdk/ server/src/sdk/
            exit 1
          fi
          echo "server/src/sdk/ is in sync"

  check-dashboard:
    name: Dashboard SDK Copy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check dashboard SDK copy
        run: |
          if ! diff -rq sdk/ dashboard/lib/sdk/ > /dev/null 2>&1; then
            echo "::error::dashboard/lib/sdk/ is out of sync with sdk/"
            echo "Run: bash scripts/sync-sdk.sh"
            diff -r sdk/ dashboard/lib/sdk/
            exit 1
          fi
          echo "dashboard/lib/sdk/ is in sync"
