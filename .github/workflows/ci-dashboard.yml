name: CI — Dashboard

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "sdk/**"
  pull_request:
    paths:
      - "dashboard/**"
      - "sdk/**"
  pull_request_target:
    paths:
      - "dashboard/**"
      - "sdk/**"

concurrency:
  group: ci-dashboard-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SOLANA_RPC_URL: "https://api.devnet.solana.com"
  NEXT_PUBLIC_GUARDRAILS_PROGRAM_ID: "11111111111111111111111111111111"
  NEXT_PUBLIC_API_URL: "http://localhost:8080"

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: dashboard
        run: npm install

      - name: Type check
        working-directory: dashboard
        run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: dashboard
        run: npm install

      - name: Lint
        working-directory: dashboard
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: dashboard
        run: npm install

      - name: Build
        working-directory: dashboard
        run: npm run build

  sdk-sync:
    name: SDK Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Verify SDK is synced
        run: |
          if ! diff -rq sdk/ dashboard/lib/sdk/ > /dev/null 2>&1; then
            echo "::error::dashboard/lib/sdk/ is out of sync with sdk/. Run: scripts/sync-sdk.sh"
            diff -rq sdk/ dashboard/lib/sdk/ || true
            exit 1
          fi
          echo "dashboard/lib/sdk/ is in sync"
