name: CI — Server

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "sdk/**"
  pull_request:
    paths:
      - "server/**"
      - "sdk/**"

concurrency:
  group: ci-server-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: server
        run: pnpm install

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Type check
        working-directory: server
        run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: server
        run: pnpm install

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Build
        working-directory: server
        run: pnpm build

  sdk-sync:
    name: SDK Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify SDK is synced
        run: |
          if ! diff -rq sdk/ server/src/sdk/ > /dev/null 2>&1; then
            echo "::error::server/src/sdk/ is out of sync with sdk/. Run: scripts/sync-sdk.sh"
            diff -rq sdk/ server/src/sdk/ || true
            exit 1
          fi
          echo "server/src/sdk/ is in sync"
